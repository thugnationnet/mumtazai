# =============================================================================
# AWS CloudFormation for Onelastai Cloud Sandboxes
# =============================================================================
# Deploy with: aws cloudformation deploy --template-file aws-infrastructure.yaml \
#              --stack-name maula-editor-sandbox --capabilities CAPABILITY_IAM
# =============================================================================

AWSTemplateFormatVersion: '2010-09-09'
Description: 'Maula Editor Cloud Sandbox Infrastructure'

Parameters:
  Environment:
    Type: String
    Default: production
    AllowedValues: [development, staging, production]
  
  DomainName:
    Type: String
    Default: apps.mumtaz.ai
    Description: Base domain for sandbox subdomains
  
  VpcId:
    Type: AWS::EC2::VPC::Id
    Description: VPC ID for sandbox containers
  
  SubnetIds:
    Type: List<AWS::EC2::Subnet::Id>
    Description: Subnet IDs for sandbox containers

Resources:
  # ==========================================================================
  # ECR Repository for Sandbox Image
  # ==========================================================================
  SandboxRepository:
    Type: AWS::ECR::Repository
    Properties:
      RepositoryName: maula-editor-sandbox
      ImageScanningConfiguration:
        ScanOnPush: true
      LifecyclePolicy:
        LifecyclePolicyText: |
          {
            "rules": [
              {
                "rulePriority": 1,
                "description": "Keep last 10 images",
                "selection": {
                  "tagStatus": "any",
                  "countType": "imageCountMoreThan",
                  "countNumber": 10
                },
                "action": {
                  "type": "expire"
                }
              }
            ]
          }

  # ==========================================================================
  # ECS Cluster for Sandboxes
  # ==========================================================================
  SandboxCluster:
    Type: AWS::ECS::Cluster
    Properties:
      ClusterName: maula-editor-sandbox-cluster
      CapacityProviders:
        - FARGATE
        - FARGATE_SPOT
      DefaultCapacityProviderStrategy:
        - CapacityProvider: FARGATE_SPOT
          Weight: 4
        - CapacityProvider: FARGATE
          Weight: 1
      ClusterSettings:
        - Name: containerInsights
          Value: enabled

  # ==========================================================================
  # Security Group for Sandbox Containers
  # ==========================================================================
  SandboxSecurityGroup:
    Type: AWS::EC2::SecurityGroup
    Properties:
      GroupDescription: Security group for sandbox containers
      VpcId: !Ref VpcId
      SecurityGroupIngress:
        # API port
        - IpProtocol: tcp
          FromPort: 3000
          ToPort: 3000
          SourceSecurityGroupId: !Ref ALBSecurityGroup
        # User app ports (3001-3010)
        - IpProtocol: tcp
          FromPort: 3001
          ToPort: 3010
          SourceSecurityGroupId: !Ref ALBSecurityGroup
      Tags:
        - Key: Name
          Value: mumtazai-sandbox-sg

  # ==========================================================================
  # Application Load Balancer
  # ==========================================================================
  ALBSecurityGroup:
    Type: AWS::EC2::SecurityGroup
    Properties:
      GroupDescription: Security group for ALB
      VpcId: !Ref VpcId
      SecurityGroupIngress:
        - IpProtocol: tcp
          FromPort: 80
          ToPort: 80
          CidrIp: 0.0.0.0/0
        - IpProtocol: tcp
          FromPort: 443
          ToPort: 443
          CidrIp: 0.0.0.0/0

  SandboxALB:
    Type: AWS::ElasticLoadBalancingV2::LoadBalancer
    Properties:
      Name: canvas-studio-sandbox-alb
      Type: application
      Scheme: internet-facing
      SecurityGroups:
        - !Ref ALBSecurityGroup
      Subnets: !Ref SubnetIds

  # Default target group (returns 404 for unknown routes)
  DefaultTargetGroup:
    Type: AWS::ElasticLoadBalancingV2::TargetGroup
    Properties:
      Name: canvas-sandbox-default-tg
      Port: 80
      Protocol: HTTP
      VpcId: !Ref VpcId
      TargetType: ip
      HealthCheckPath: /health
      HealthCheckIntervalSeconds: 30

  # HTTPS Listener (use HTTP for dev, add cert for production)
  ALBListener:
    Type: AWS::ElasticLoadBalancingV2::Listener
    Properties:
      LoadBalancerArn: !Ref SandboxALB
      Port: 80
      Protocol: HTTP
      DefaultActions:
        - Type: fixed-response
          FixedResponseConfig:
            StatusCode: '404'
            ContentType: text/plain
            MessageBody: 'Sandbox not found'

  # ==========================================================================
  # IAM Roles
  # ==========================================================================
  ECSTaskExecutionRole:
    Type: AWS::IAM::Role
    Properties:
      RoleName: canvas-studio-sandbox-execution-role
      AssumeRolePolicyDocument:
        Version: '2012-10-17'
        Statement:
          - Effect: Allow
            Principal:
              Service: ecs-tasks.amazonaws.com
            Action: sts:AssumeRole
      ManagedPolicyArns:
        - arn:aws:iam::aws:policy/service-role/AmazonECSTaskExecutionRolePolicy
      Policies:
        - PolicyName: ECRPullPolicy
          PolicyDocument:
            Version: '2012-10-17'
            Statement:
              - Effect: Allow
                Action:
                  - ecr:GetAuthorizationToken
                  - ecr:BatchCheckLayerAvailability
                  - ecr:GetDownloadUrlForLayer
                  - ecr:BatchGetImage
                Resource: '*'

  ECSTaskRole:
    Type: AWS::IAM::Role
    Properties:
      RoleName: canvas-studio-sandbox-task-role
      AssumeRolePolicyDocument:
        Version: '2012-10-17'
        Statement:
          - Effect: Allow
            Principal:
              Service: ecs-tasks.amazonaws.com
            Action: sts:AssumeRole
      Policies:
        - PolicyName: SandboxS3Access
          PolicyDocument:
            Version: '2012-10-17'
            Statement:
              - Effect: Allow
                Action:
                  - s3:PutObject
                  - s3:GetObject
                Resource:
                  - !Sub 'arn:aws:s3:::${StaticHostingBucket}/*'

  # ==========================================================================
  # S3 Bucket for Static Hosting (deployed apps)
  # ==========================================================================
  StaticHostingBucket:
    Type: AWS::S3::Bucket
    Properties:
      BucketName: !Sub 'mumtazai-canvas-hosted-apps-${AWS::AccountId}'
      PublicAccessBlockConfiguration:
        BlockPublicAcls: false
        BlockPublicPolicy: false
        IgnorePublicAcls: false
        RestrictPublicBuckets: false
      WebsiteConfiguration:
        IndexDocument: index.html
        ErrorDocument: index.html
      CorsConfiguration:
        CorsRules:
          - AllowedHeaders: ['*']
            AllowedMethods: [GET, HEAD]
            AllowedOrigins: ['*']
            MaxAge: 3600

  StaticHostingBucketPolicy:
    Type: AWS::S3::BucketPolicy
    Properties:
      Bucket: !Ref StaticHostingBucket
      PolicyDocument:
        Version: '2012-10-17'
        Statement:
          - Effect: Allow
            Principal: '*'
            Action: s3:GetObject
            Resource: !Sub '${StaticHostingBucket.Arn}/*'

  # ==========================================================================
  # CloudFront for Static Hosting
  # ==========================================================================
  CloudFrontDistribution:
    Type: AWS::CloudFront::Distribution
    Properties:
      DistributionConfig:
        Enabled: true
        DefaultRootObject: index.html
        Origins:
          - Id: S3Origin
            DomainName: !GetAtt StaticHostingBucket.RegionalDomainName
            S3OriginConfig:
              OriginAccessIdentity: ''
        DefaultCacheBehavior:
          TargetOriginId: S3Origin
          ViewerProtocolPolicy: redirect-to-https
          AllowedMethods: [GET, HEAD, OPTIONS]
          CachedMethods: [GET, HEAD]
          ForwardedValues:
            QueryString: false
            Cookies:
              Forward: none
          MinTTL: 0
          DefaultTTL: 86400
          MaxTTL: 31536000
        CustomErrorResponses:
          - ErrorCode: 404
            ResponseCode: 200
            ResponsePagePath: /index.html
          - ErrorCode: 403
            ResponseCode: 200
            ResponsePagePath: /index.html
        PriceClass: PriceClass_100

  # ==========================================================================
  # DynamoDB for Session Tracking
  # ==========================================================================
  SandboxSessionsTable:
    Type: AWS::DynamoDB::Table
    Properties:
      TableName: canvas-studio-sandbox-sessions
      BillingMode: PAY_PER_REQUEST
      AttributeDefinitions:
        - AttributeName: sessionId
          AttributeType: S
        - AttributeName: userId
          AttributeType: S
      KeySchema:
        - AttributeName: sessionId
          KeyType: HASH
      GlobalSecondaryIndexes:
        - IndexName: userId-index
          KeySchema:
            - AttributeName: userId
              KeyType: HASH
          Projection:
            ProjectionType: ALL
      TimeToLiveSpecification:
        AttributeName: expiresAt
        Enabled: true

# =============================================================================
# Outputs
# =============================================================================
Outputs:
  ClusterArn:
    Value: !GetAtt SandboxCluster.Arn
    Export:
      Name: !Sub '${AWS::StackName}-ClusterArn'
  
  ECRRepositoryUri:
    Value: !Sub '${AWS::AccountId}.dkr.ecr.${AWS::Region}.amazonaws.com/${SandboxRepository}'
    Export:
      Name: !Sub '${AWS::StackName}-ECRUri'
  
  ALBDnsName:
    Value: !GetAtt SandboxALB.DNSName
    Export:
      Name: !Sub '${AWS::StackName}-ALBDns'
  
  StaticHostingBucketName:
    Value: !Ref StaticHostingBucket
    Export:
      Name: !Sub '${AWS::StackName}-S3Bucket'
  
  CloudFrontDomain:
    Value: !GetAtt CloudFrontDistribution.DomainName
    Export:
      Name: !Sub '${AWS::StackName}-CloudFrontDomain'
  
  SecurityGroupId:
    Value: !Ref SandboxSecurityGroup
    Export:
      Name: !Sub '${AWS::StackName}-SecurityGroupId'
